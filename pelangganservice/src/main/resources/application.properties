# Port server
server.port=8082
spring.application.name=pelangganservice

# Konfigurasi H2 Database (File-based)
spring.h2.console.enabled=true
# ADJUSTMENT: Changed from 'mem:pelanggandb' to a file path inside the container
spring.datasource.url=jdbc:h2:file:/app/data/pelanggan;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# This is correct and ensures the table is created in the database file
spring.jpa.hibernate.ddl-auto=update

# Konfigurasi Eureka Client (This is correct)
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
eureka.instance.prefer-ip-address=true