server.port = 8081
spring.application.name=produk

# This configuration is now correct because the Dockerfile will create the /app/data directory
spring.datasource.url=jdbc:h2:file:/app/data/produk;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# THIS IS THE CRITICAL CHANGE: Uncomment this line and set it to 'update'
# This tells Hibernate to create the 'produk' table if it doesn't exist.
spring.jpa.hibernate.ddl-auto=update

# Eureka configuration remains the same
eureka.client.service-url.defaultZone=http://eureka:8761/eureka
eureka.instance.prefer-ip-address=true